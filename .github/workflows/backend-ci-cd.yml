name: Backend CI/CD

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "modal_app.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "scripts/**"
      - ".github/workflows/backend-ci-cd.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - "modal_app.py"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - "scripts/**"
      - ".github/workflows/backend-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked development dependencies
        run: uv sync --frozen --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run backend tests
        run: uv run pytest

  deploy:
    name: Deploy to Modal production
    needs: ci
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: backend-production-deploy
      cancel-in-progress: false
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_API_URL: ${{ vars.MODAL_API_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --group dev

      - name: Deploy fpl-technocrat to Modal
        run: uv run modal deploy modal_app.py

      - name: Verify deployed API health
        shell: bash
        run: |
          if [[ -z "${MODAL_API_URL}" ]]; then
            echo "MODAL_API_URL is not configured for the production environment." >&2
            exit 1
          fi

          health_url="${MODAL_API_URL%/}/health"
          for attempt in {1..12}; do
            echo "Health check attempt ${attempt}/12: ${health_url}"
            if curl --fail --silent --show-error \
              --connect-timeout 10 \
              --max-time 30 \
              "${health_url}"; then
              echo
              echo "Modal API health check succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 12 ]]; then
              sleep 10
            fi
          done

          echo "Modal API health check failed after 12 attempts." >&2
          exit 1
